<div class="auth-shell">
  <section class="brand-header">
    <div class="brand-mark">HB</div>
    <h1>HireBridge</h1>
    <p>Admin workspace access</p>
  </section>

  <section class="auth-card">
    <div class="card-header">
      <h2>Admin sign in</h2>
      <p>Please enter admin credentials</p>
    </div>

    <div class="error-alert shake" *ngIf="errorMsg">
      <div class="alert-icon"><i class="fas fa-circle-exclamation"></i></div>
      <div class="alert-content">
        <p>{{ errorMsg }}</p>
      </div>
      <button class="alert-close" (click)="errorMsg = ''"><i class="fas fa-times"></i></button>
    </div>

    <form (ngSubmit)="submit()" class="form">
      <div class="field-header">
        <label for="admin-login-email">Email</label>
      </div>
      <div class="field with-icon">
        <input
          id="admin-login-email"
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="admin@example.com"
          (blur)="onBlur('email')"
        />
        <i class="fas fa-envelope"></i>
      </div>
      <div class="inline-error" *ngIf="touched['email'] && isEmpty(email)">
        <i class="fas fa-circle-exclamation"></i> Email is required
      </div>

      <div class="field-row">
        <label for="admin-login-password">Password</label>
      </div>
      <div class="field with-icon">
        <input
          id="admin-login-password"
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="........"
          (blur)="onBlur('password')"
        />
        <i class="fas fa-lock"></i>
      </div>
      <div class="inline-error" *ngIf="touched['password'] && isEmpty(password)">
        <i class="fas fa-circle-exclamation"></i> Password is required
      </div>

      <button type="submit" class="primary-btn" [disabled]="loading">
        <span *ngIf="!loading">Log In <i class="fas fa-arrow-right"></i></span>
        <span *ngIf="loading" class="loading-content">
          <i class="fas fa-circle-notch fa-spin"></i> Logging in...
        </span>
      </button>
    </form>
  </section>



  <div class="auth-link-row">
    <span>Back to user login?</span>
    <a routerLink="/login">Go to login</a>
  </div>
</div>
